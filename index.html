<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>民事法律助手 · 完整版</title>
    <style>
        :root {
            --primary: #0A2540;
            --surface: #FFFFFF;
            --accent: #00B4D8;
            --accent-gradient: linear-gradient(135deg, #00B4D8, #0077B6);
            --bg: #F5F7FA;
            --text: #1E293B;
            --text-secondary: #64748B;
            --text-tertiary: #94A3B8;
            --border: #E2E8F0;
            --border-light: #F1F5F9;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius: 18px;
            --radius-lg: 24px;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --info: #3B82F6;
        }
        .dark-mode {
            --primary: #0F1B2D;
            --surface: #1E293B;
            --bg: #0F172A;
            --text: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-tertiary: #64748B;
            --border: #334155;
            --border-light: #1E293B;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .phone-frame {
            width: 393px;
            height: 852px;
            background: #000;
            border-radius: 44px;
            overflow: hidden;
            box-shadow: 0 0 0 3px #1a1a1a, 0 0 0 6px #333, 0 30px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .status-bar-ios {
            height: 54px;
            background: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 28px 8px;
            color: #FFF;
            font-size: 13px;
            font-weight: 600;
            z-index: 99;
            flex-shrink: 0;
        }
        .app-screen {
            flex: 1;
            background: var(--bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .page-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            background: var(--bg);
        }
        .page-container::-webkit-scrollbar {
            display: none;
        }
        .page {
            display: none;
            min-height: 100%;
            background: var(--bg);
            padding: 0 0 40px;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes shimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: calc(200px + 100%) 0;
            }
        }
        .tab-bar {
            background: var(--surface);
            border-top: 0.5px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 4px 4px 18px;
            backdrop-filter: blur(30px);
            z-index: 90;
            flex-shrink: 0;
            gap: 2px;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            font-size: 9px;
            font-weight: 500;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 3px 5px;
            border-radius: 14px;
            transition: 0.2s;
            min-width: 44px;
            position: relative;
        }
        .tab-item.active {
            color: var(--accent);
            font-weight: 700;
        }
        .tab-item.active::after {
            content: '';
            position: absolute;
            top: -3px;
            width: 14px;
            height: 2px;
            background: var(--accent-gradient);
            border-radius: 1px;
        }
        .tab-icon {
            font-size: 19px;
            line-height: 1;
        }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 15px;
            box-shadow: var(--shadow);
            margin: 5px 14px 8px;
            border: 0.5px solid var(--border-light);
            cursor: pointer;
            transition: 0.2s;
        }
        .card:active {
            transform: scale(0.985);
        }
        .card-accent {
            background: var(--accent-gradient);
            color: #FFF;
            border: none;
        }
        .card-accent .text-secondary {
            color: rgba(255, 255, 255, 0.8);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            border: none;
            background: var(--accent-gradient);
            color: #FFF;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn:active {
            transform: scale(0.94);
            opacity: 0.8;
        }
        .btn-outline {
            background: transparent;
            border: 1.5px solid var(--accent);
            color: var(--accent);
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 10px;
            border-radius: 14px;
        }
        .btn-lg {
            padding: 14px 22px;
            font-size: 14px;
            border-radius: 24px;
            width: 100%;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            padding: 10px 16px 2px;
            letter-spacing: -0.2px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 7px;
            padding: 0 14px;
            margin: 4px 0;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            padding: 0 14px;
            margin: 4px 0;
        }
        .grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 4px;
            padding: 0 14px;
            margin: 4px 0;
        }
        .entry-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 12px 4px;
            text-align: center;
            box-shadow: var(--shadow);
            font-weight: 600;
            font-size: 11px;
            color: var(--text);
            cursor: pointer;
            border: 0.5px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .entry-card:active {
            background: #F0F9FF;
            transform: scale(0.95);
        }
        .entry-icon {
            font-size: 24px;
        }
        .badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 9px;
            font-size: 9px;
            font-weight: 600;
        }
        .badge-ai {
            background: #E0F7FF;
            color: #0077B6;
        }
        .badge-warning {
            background: #FEF3C7;
            color: #92400E;
        }
        .badge-danger {
            background: #FEE2E2;
            color: #991B1B;
        }
        .badge-success {
            background: #D1FAE5;
            color: #065F46;
        }
        .badge-info {
            background: #DBEAFE;
            color: #1E40AF;
        }
        .search-bar {
            background: var(--surface);
            border-radius: 24px;
            padding: 11px 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            box-shadow: var(--shadow);
            margin: 6px 14px;
            border: 1px solid var(--border-light);
            cursor: pointer;
            font-size: 12px;
            color: var(--text-tertiary);
        }
        .input-field {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            outline: none;
            margin-bottom: 7px;
        }
        .input-field:focus {
            border-color: var(--accent);
        }
        .textarea-field {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }
        .textarea-field:focus {
            border-color: var(--accent);
        }
        .score-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 4px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            margin: 10px auto;
            box-shadow: 0 0 20px rgba(0, 180, 216, 0.2);
        }
        .progress-bar {
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            overflow: hidden;
            margin: 5px 0;
        }
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent-gradient);
            transition: width 0.5s ease;
        }
        .nav-header {
            display: flex;
            align-items: center;
            gap: 7px;
            padding: 6px 14px;
            font-weight: 700;
            font-size: 15px;
            color: var(--text);
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            backdrop-filter: blur(20px);
        }
        .nav-back {
            width: 28px;
            height: 28px;
            border-radius: 14px;
            background: var(--surface);
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-back:active {
            transform: scale(0.85);
        }
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 6px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 500;
            background: var(--border-light);
            color: var(--text);
            cursor: pointer;
            margin: 1px;
        }
        .chip.active {
            background: #E0F7FF;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-weight: 600;
        }
        .toast {
            position: fixed;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            background: #1E293B;
            color: #FFF;
            padding: 9px 18px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 12px;
            z-index: 9999;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.6s forwards;
            pointer-events: none;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-14px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-14px);
            }
        }
        .compare-table {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 3px;
            font-size: 10px;
            text-align: center;
        }
        .compare-table div {
            padding: 7px 3px;
            background: var(--border-light);
            border-radius: 6px;
        }
        .compare-table .header-col {
            font-weight: 700;
            background: transparent;
            text-align: left;
        }
        .intake-hero {
            margin: 8px 14px 10px;
            padding: 22px 18px;
            border-radius: 26px;
            color: #FFF;
            background: radial-gradient(circle at 20% 10%, rgba(0,180,216,.45), transparent 28%), linear-gradient(145deg, #071A2F, #123A5A 55%, #006D8F);
            box-shadow: 0 18px 45px rgba(0, 119, 182, 0.25);
            position: relative;
            overflow: hidden;
        }
        .intake-hero::after {
            content: '';
            position: absolute;
            right: -40px;
            top: -40px;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.18);
        }
        .ai-orb {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(255,255,255,.16);
            border: 1px solid rgba(255,255,255,.2);
            box-shadow: inset 0 0 20px rgba(255,255,255,.08);
        }
        .case-cover {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFF;
            font-size: 22px;
            background: var(--accent-gradient);
            flex-shrink: 0;
        }
        .chat-page {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding-bottom: 0;
            background: linear-gradient(180deg, var(--bg), #EAF6FB);
        }
        .chat-list {
            padding: 10px 14px 135px;
        }
        .msg-row {
            display: flex;
            gap: 8px;
            margin: 9px 0;
            animation: fadeIn .28s ease;
        }
        .msg-row.user {
            justify-content: flex-end;
        }
        .avatar-ai {
            width: 30px;
            height: 30px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-gradient);
            color: #FFF;
            flex-shrink: 0;
        }
        .bubble {
            max-width: 78%;
            padding: 10px 12px;
            border-radius: 16px;
            font-size: 12px;
            line-height: 1.55;
            box-shadow: var(--shadow);
            background: var(--surface);
            color: var(--text);
        }
        .msg-row.user .bubble {
            color: #FFF;
            background: var(--accent-gradient);
            border-bottom-right-radius: 5px;
        }
        .msg-row.ai .bubble {
            border-bottom-left-radius: 5px;
        }
        .typing-dot {
            display: inline-block;
            width: 5px;
            height: 5px;
            margin: 0 2px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 1s infinite;
        }
        .intake-panel {
            position: sticky;
            bottom: 0;
            padding: 8px 12px 12px;
            background: linear-gradient(180deg, transparent, var(--bg) 24%);
            z-index: 15;
        }
        .upload-tools {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            padding: 6px 2px;
        }
        .summary-mini {
            margin: 8px 14px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(0,180,216,.09);
            border: 1px solid rgba(0,180,216,.22);
        }
        .plan-card {
            border-left: 4px solid var(--accent);
        }
        @media (max-width: 420px) { 
            .phone-frame {
                width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="phone-frame" id="phoneFrame">
        <div class="status-bar-ios" id="statusBar"><span>9:41</span><span>民事法律助手</span><span>📶 🔋</span></div>
        <div class="app-screen">
            <div class="page-container" id="pageContainer"></div>
            <div class="tab-bar" id="tabBar">
                <div class="tab-item active" data-tab="home"><span class="tab-icon">🏠</span>首页</div>
                <div class="tab-item" data-tab="evidence"><span class="tab-icon">📁</span>证据</div>
                <div class="tab-item" data-tab="ai"><span class="tab-icon">🤖</span>AI助手</div>
                <div class="tab-item" data-tab="law"><span class="tab-icon">⚖️</span>法律服务</div>
                <div class="tab-item" data-tab="profile"><span class="tab-icon">👤</span>我的</div>
            </div>
        </div>
    </div>
    <div id="toastContainer"></div>

    <script>
        (function() {
            const pageContainer = document.getElementById('pageContainer');
            const tabBar = document.getElementById('tabBar');
            const toastContainer = document.getElementById('toastContainer');
            let currentTab = 'home';
            let pageHistory = [];
            let currentPageId = 'splash';
            let isDarkMode = true;
            let intakeStep = 0;
            let activeCaseMode = null;
            let intakeCase = {
                title: '朋友借款5万元未还', type: '民间借贷纠纷', amount: '¥50,000', stage: 'AI接案中', health: 72,
                evidence: ['借条', '微信聊天记录', '转账记录'], missing: ['银行流水', '催款录音'], updated: '刚刚更新'
            };
            document.body.classList.add('dark-mode');
            document.getElementById('phoneFrame').style.background = '#0F172A';

            function showToast(msg) {
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }

            function navigateTo(pageId, data = {}) {
                pageHistory.push({ tab: currentTab, page: currentPageId });
                currentPageId = pageId;
                renderPage(pageId, data);
                pageContainer.scrollTop = 0;
            }

            function goBack() {
                if (activeCaseMode && currentPageId !== activeCaseMode) {
                    currentPageId = activeCaseMode;
                    renderPage(activeCaseMode);
                    return;
                }
                if (pageHistory.length > 0) {
                    const prev = pageHistory.pop();
                    currentPageId = prev.page;
                    if (prev.tab !== currentTab) switchTab(prev.tab, true);
                    else renderPage(prev.page);
                } else { switchTab('home', true); }
            }

            function switchTab(tabId, silent = false) {
                activeCaseMode = null;
                if (!silent && tabId === currentTab) return;
                currentTab = tabId;
                pageHistory = [];
                currentPageId = null;
                tabBar.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                const at = tabBar.querySelector(`[data-tab="${tabId}"]`);
                if (at) at.classList.add('active');
                const pages = { home: 'home', evidence: 'evidence-center', ai: 'ai-diagnosis', law: 'law-center',
                    profile: 'profile' };
                renderPage(pages[tabId] || 'home');
                pageContainer.scrollTop = 0;
            }

            function renderPage(pageId, data = {}) {
                pageContainer.innerHTML = '';
                const page = document.createElement('div');
                page.className = 'page active';
                page.id = 'page-' + pageId;
                const builders = {
                    'splash': buildSplash,
                    'home': buildHome,
                    'ai-intake': buildAIIntake,
                    'my-cases': buildMyCases,
                    'case-report': buildCaseReport,
                    'rights-plan': buildRightsPlan,
                    'negotiation-assistant': buildNegotiationAssistant,
                    'litigation-mode': buildLitigationMode,
                    'login': buildLogin,
                    'register': buildRegister,
                    'search': buildSearch,
                    'search-result': buildSearchResult,
                    'ai-diagnosis': buildAIDiag,
                    'ai-diagnosis-result': buildAIDiagResult,
                    'ai-health': buildAIHealth,
                    'evidence-center': buildEvidenceCenter,
                    'evidence-upload': buildEvUpload,
                    'evidence-ocr': buildEvOCR,
                    'evidence-analysis': buildEvAnalysis,
                    'evidence-gap': buildEvGap,
                    'evidence-timeline': buildEvTimeline,
                    'evidence-graph': buildEvGraph,
                    'lawsuit-nav': buildLawsuitNav,
                    'limitation': buildLimitation,
                    'document-gen': buildDocGen,
                    'document-edit': buildDocEdit,
                    'mock-court': buildMockCourt,
                    'mock-judge': buildMockJudge,
                    'mock-defendant': buildMockDef,
                    'fee-calc': buildFeeCalc,
                    'court-find': buildCourtFind,
                    'lawyer': buildLawyer,
                    'roadmap': buildRoadmap,
                    'tasks': buildTasks,
                    'archive': buildArchive,
                    'knowledge': buildKnowledge,
                    'knowledge-graph': buildKnowledgeGraph,
                    'emotion': buildEmotion,
                    'enterprise': buildEnterprise,
                    'enterprise-report': buildEntReport,
                    'contract-review-ai': buildContractReviewAI,
                    'calendar': buildCalendar,
                    'profile': buildProfile,
                    'settings': buildSettings,
                    'privacy': buildPrivacy,
                    'messages': buildMessages,
                    'help': buildHelp,
                    'law-center': buildLawCenter,
                    'nearby-firms': buildNearbyFirms,
                    'lawyer-recommend': buildLawyerRec,
                    'fee-analysis': buildFeeAnalysis,
                    'fee-quote-check': buildFeeQuote,
                    'contract-review': buildContractReview,
                    'lawyer-comm': buildLawyerComm,
                    'consult-records': buildConsultRecords,
                    'lawyer-compare': buildLawyerCompare,
                    'fee-budget': buildFeeBudget,
                    'risk-warning': buildRiskWarning,
                    'law-score': buildLawScore,
                    'second-opinion': buildSecondOpinion,
                    'case-readiness': buildCaseReadiness,
                    'lawyer-sim': buildLawyerSim,
                    'empty': buildEmpty,
                    'loading': buildLoading,
                    'error': buildError,
                    'notfound': buildNotFound,
                };
                if (builders[pageId]) builders[pageId](page, data);
                else {
                    goBack();
                    return;
                }
                pageContainer.appendChild(page);
            }

            // ===================== 启动页 =====================
            function buildSplash(page) {
                page.style.background = 'var(--primary)';
                page.style.display = 'flex';
                page.style.flexDirection = 'column';
                page.style.alignItems = 'center';
                page.style.justifyContent = 'center';
                page.style.minHeight = '100%';
                page.style.color = '#FFF';
                page.innerHTML = `
                <div style="font-size:50px;animation:pulse 2s infinite;">⚖️</div>
                <h1 style="font-size:26px;font-weight:800;">民事法律助手</h1>
                <p style="opacity:0.7;font-size:13px;">AI-Powered Legal Assistant</p>
                <p style="position:absolute;bottom:55px;font-size:10px;opacity:0.5;">不构成法律意见·请咨询执业律师</p>
              `;
                setTimeout(() => { if (currentPageId === 'splash') switchTab('home'); }, 2000);
            }

            // ===================== 登录/注册 =====================
